<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려견순찰대연합회 — 행사 운영 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f5f1;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e7e0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--border3:rgba(0,0,0,0.22);
  --text:#181816;--text2:#54544e;--text3:#98988f;
  --accent:#2d6a4f;--accent2:#d8f3e3;--accent3:#1b4332;
  --blue:#1565c0;--blue2:#e3f2fd;
  --red:#c62828;--red2:#ffebee;
  --amber:#b45309;--amber2:#fef3c7;
  --purple:#6b21a8;--purple2:#f3e8ff;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo-mark{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.sidebar-org{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.sidebar-name{font-size:14px;font-weight:700;color:var(--text)}
.sidebar-section{padding:12px 10px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--rs);margin:1px 6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .12s;border:none;background:transparent;width:calc(100% - 12px);text-align:left;font-family:'Noto Sans KR',sans-serif}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent2);color:var(--accent3)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.event-list{padding:4px 6px}
.event-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin-bottom:1px}
.event-item:hover{background:var(--surface2)}
.event-item.active{background:var(--accent2);color:var(--accent3);font-weight:500}
.event-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:12px 6px;border-top:1px solid var(--border)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
.content{padding:24px;flex:1}
.btn{padding:7px 14px;font-size:13px;font-weight:500;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .13s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:#235c42}
.btn.danger{background:var(--red2);color:var(--red);border-color:transparent}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.ghost{border-color:transparent;color:var(--text3)}
.btn.ghost:hover{background:var(--surface2);color:var(--text)}
.subtabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--rs);padding:3px;margin-bottom:20px;width:fit-content}
.subtab{padding:6px 14px;font-size:13px;border-radius:5px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .12s}
.subtab.active{background:var(--surface);color:var(--text);box-shadow:var(--sh)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.card+.card{margin-top:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.progress-ring{display:flex;align-items:center;gap:14px}
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:5}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .4s}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:box-shadow .13s,border-color .13s;position:relative}
.cl-item:hover{box-shadow:var(--sh);border-color:var(--border2)}
.chkbox{width:20px;height:20px;min-width:20px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:1px;cursor:pointer;transition:all .13s;flex-shrink:0}
.chkbox:hover{border-color:var(--accent)}
.chkbox.on{background:var(--accent);border-color:var(--accent)}
.chkbox svg{display:none}
.chkbox.on svg{display:block}
.cl-body{flex:1;min-width:0;cursor:pointer}
.cl-text{font-size:14px;color:var(--text);line-height:1.45;transition:all .2s}
.cl-text.done{text-decoration:line-through;text-decoration-color:var(--text3);color:var(--text3)}
.cl-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-사전{background:var(--accent2);color:var(--accent3)}
.tag-당일{background:var(--blue2);color:var(--blue)}
.tag-긴급{background:var(--red2);color:var(--red)}
.tag-홍보{background:var(--amber2);color:var(--amber)}
.tag-계약{background:var(--purple2);color:var(--purple)}
.tag-person{background:var(--surface2);color:var(--text2)}
.tag-date{background:var(--surface2);color:var(--text2);font-family:'DM Mono',monospace}
.cl-actions{display:none;gap:3px;flex-shrink:0}
.edit-on .cl-item:hover .cl-actions{display:flex}
.icon-btn{width:28px;height:28px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .13s;font-size:13px}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.del:hover{background:var(--red2);color:var(--red)}
.sec{margin-bottom:20px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.sec-prog{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}
.sec-actions{display:flex;gap:4px}
.add-item-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:'Noto Sans KR',sans-serif;opacity:0;transition:opacity .13s}
.sec:hover .add-item-btn{opacity:1}
.add-item-btn:hover{background:var(--accent2)}
.add-sec-btn{width:100%;padding:9px;border:1.5px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .13s;margin-top:6px;display:none}
.edit-on .add-sec-btn{display:block}
.add-sec-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
.person-hd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.person-name-el{font-size:16px;font-weight:700}
.person-role-el{font-size:13px;color:var(--text2);margin-top:2px}
.person-stat{margin-left:auto;text-align:right}
.person-pct{font-size:22px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace}
.person-cnt{font-size:12px;color:var(--text3)}
.timeline{position:relative;padding-left:28px}
.tl-line{position:absolute;left:10px;top:0;bottom:0;width:1.5px;background:var(--border)}
.tl-group{margin-bottom:28px}
.tl-date-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.tl-dot{position:absolute;left:4px;width:13px;height:13px;border-radius:50%;background:var(--accent);border:2.5px solid var(--surface);margin-top:2px}
.tl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:box-shadow .13s}
.tl-item:hover{box-shadow:var(--sh);border-color:var(--border2)}
.tl-item-body{flex:1;min-width:0}
.tl-item-text{font-size:14px;color:var(--text);line-height:1.45}
.tl-item-text.done{text-decoration:line-through;color:var(--text3)}
.tl-item-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;text-align:center}
.stat-n{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px}
.stat-card.hi .stat-n{color:var(--accent)}
.setting-section{margin-bottom:28px}
.setting-title{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)}
.setting-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.setting-row-info{flex:1}
.setting-row-name{font-size:14px;font-weight:500}
.setting-row-sub{font-size:12px;color:var(--text3);margin-top:1px}
.color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:box-shadow .13s;cursor:pointer}
.event-card:hover{box-shadow:var(--sh2);border-color:var(--border2)}
.event-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-card-info{flex:1}
.event-card-name{font-size:15px;font-weight:700}
.event-card-meta{font-size:12px;color:var(--text3);margin-top:3px}
.event-card-prog{text-align:right}
.event-card-pct{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}
.event-card-cnt{font-size:11px;color:var(--text3)}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px}
.backdrop.show{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:500px;box-shadow:var(--sh2);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .13s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag-group{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.tag-check{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;padding:4px 10px;border:1px solid var(--border2);border-radius:20px;transition:all .13s;user-select:none}
.tag-check input{display:none}
.tag-check.sel{border-color:var(--accent);background:var(--accent2);color:var(--accent3)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.color-options{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .13s}
.color-opt.sel{border-color:var(--text)}
.edit-banner{display:none;background:var(--amber2);border-bottom:1px solid #fcd34d;padding:9px 24px;font-size:13px;color:var(--amber);align-items:center;gap:8px}
.edit-banner.show{display:flex}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:14px}

/* ── EXCEL UPLOAD ── */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:32px 24px;text-align:center;transition:all .2s;cursor:pointer;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent2)}
.upload-zone-icon{font-size:36px;margin-bottom:10px}
.upload-zone-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.upload-zone-sub{font-size:12px;color:var(--text3)}
.upload-zone input[type=file]{display:none}
.upload-progress{margin-top:14px}
.upload-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:6px}
.upload-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.upload-result{margin-top:12px;padding:12px 14px;border-radius:var(--rs);font-size:13px}
.upload-result.ok{background:var(--accent2);color:var(--accent3);border:1px solid rgba(45,106,79,.2)}
.upload-result.err{background:var(--red2);color:var(--red);border:1px solid rgba(198,40,40,.2)}
.template-box{background:var(--surface2);border-radius:var(--r);padding:16px 18px;margin-top:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.template-box-info{flex:1;min-width:0}
.template-box-title{font-size:13px;font-weight:700}
.template-box-sub{font-size:12px;color:var(--text3);margin-top:2px}
.sheet-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.sheet-tab{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .13s}
.sheet-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.preview-table th{background:var(--surface2);padding:6px 10px;text-align:left;font-weight:700;border-bottom:1px solid var(--border2);color:var(--text2);white-space:nowrap}
.preview-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
.preview-table tr:last-child td{border-bottom:none}
.preview-table tr:hover td{background:var(--surface2)}
.preview-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rs);max-height:300px;overflow-y:auto}
.import-mapping{margin-top:16px}
.mapping-row{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;align-items:center;margin-bottom:8px}
.mapping-arrow{text-align:center;color:var(--text3);font-size:14px}

@media(max-width:700px){
  .sidebar{display:none}
  .content{padding:16px 12px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-mark">🐾</div>
    <div class="sidebar-org">반려견순찰대연합회</div>
    <div class="sidebar-name">행사 운영 관리</div>
  </div>
  <div class="sidebar-section">메뉴</div>
  <button class="nav-item active" data-view="dashboard" onclick="setView('dashboard')"><span class="nav-icon">🏠</span>대시보드</button>
  <button class="nav-item" data-view="checklist" onclick="setView('checklist')"><span class="nav-icon">✅</span>R&R 체크리스트</button>
  <button class="nav-item" data-view="timeline" onclick="setView('timeline')"><span class="nav-icon">📅</span>타임라인</button>
  <button class="nav-item" data-view="import" onclick="setView('import')"><span class="nav-icon">📤</span>엑셀 가져오기</button>
  <button class="nav-item" data-view="settings" onclick="setView('settings')"><span class="nav-icon">⚙️</span>설정</button>
  <div class="sidebar-section" style="margin-top:8px">행사 목록</div>
  <div class="event-list" id="sidebarEvents"></div>
  <div class="sidebar-bottom">
    <button class="btn sm primary" style="width:100%;justify-content:center" onclick="openNewEventModal()">+ 행사 추가</button>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">대시보드</div>
      <div class="topbar-sub" id="topbarSub">전체 행사 현황</div>
    </div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <div class="edit-banner" id="editBanner">✏️ 편집 모드 — 항목에 마우스를 올리면 수정·삭제 버튼이 나타납니다</div>
  <div class="content" id="mainContent"></div>
</div>
</div>

<!-- 행사 추가/수정 -->
<div class="backdrop" id="eventModal">
<div class="modal">
  <h3 id="eventModalTitle">행사 추가</h3>
  <div class="form-group"><label class="form-label">행사명</label><input class="form-input" id="em_name" placeholder="예: 2026 반려견 걷기대회"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">행사일</label><input class="form-input" id="em_date" type="date"></div>
    <div class="form-group"><label class="form-label">장소</label><input class="form-input" id="em_place" placeholder="예: 안산 호수공원"></div>
  </div>
  <div class="form-group"><label class="form-label">색상</label>
    <div class="color-options" id="em_colors">
      <div class="color-opt sel" data-color="#2d6a4f" style="background:#2d6a4f"></div>
      <div class="color-opt" data-color="#1565c0" style="background:#1565c0"></div>
      <div class="color-opt" data-color="#b45309" style="background:#b45309"></div>
      <div class="color-opt" data-color="#c62828" style="background:#c62828"></div>
      <div class="color-opt" data-color="#6b21a8" style="background:#6b21a8"></div>
      <div class="color-opt" data-color="#0e7490" style="background:#0e7490"></div>
    </div>
  </div>
  <div class="form-group"><label class="form-label">메모</label><textarea class="form-textarea" id="em_note" rows="2" placeholder="행사 설명"></textarea></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('eventModal')">취소</button>
    <button class="btn primary" onclick="saveEvent()">저장</button>
  </div>
</div>
</div>

<!-- 담당자 추가/수정 -->
<div class="backdrop" id="personModal">
<div class="modal">
  <h3 id="personModalTitle">담당자 추가</h3>
  <div class="form-row">
    <div class="form-group"><label class="form-label">이름</label><input class="form-input" id="pm_name" placeholder="예: 김지민"></div>

function renderContent(){
  var el=document.getElementById('mainContent');

// ── DASHBOARD ──
function renderDashboard(){
  var total=db.items.length, done=db.items.filter(function(i){return db.checked[i.id];}).length;
  var pct=total?Math.round(done/total*100):0;
  var html='<div class="stats-row">'
    +'<div class="stat-card hi"><div class="stat-n">'+db.events.length+'</div><div class="stat-l">총 행사</div></div>'
    +'<div class="stat-card hi"><div class="stat-n">'+pct+'%</div><div class="stat-l">전체 진행률</div></div>'
    +'<div class="stat-card"><div class="stat-n">'+done+'</div><div class="stat-l">완료 항목</div></div>'
    +'<div class="stat-card"><div class="stat-n">'+(total-done)+'</div><div class="stat-l">미완료 항목</div></div>'
    +'<div class="stat-card"><div class="stat-n">'+db.people.length+'</div><div class="stat-l">담당자</div></div>'
    +'</div>';
  html+='<div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text2)">행사 목록</div>';
  if(!db.events.length) return html+'<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">등록된 행사가 없습니다</div></div>';
  db.events.forEach(function(ev){
    var items=db.items.filter(function(i){return i.eventId===ev.id;});
    var d=items.filter(function(i){return db.checked[i.id];}).length;
    var p=items.length?Math.round(d/items.length*100):0;
    var evDate=ev.date?new Date(ev.date).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}):'';
    var r=22,circ=2*Math.PI*r,offset=circ*(1-p/100);
    html+='<div class="event-card" onclick="setView(\'checklist\',\''+ev.id+'\')">'
      +'<div style="width:56px;height:56px;flex-shrink:0;position:relative">'
      +'<svg width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="'+r+'" class="ring-bg"/>'
      +'<circle cx="28" cy="28" r="'+r+'" fill="none" stroke="'+ev.color+'" stroke-width="5" stroke-linecap="round" transform="rotate(-90 28 28)" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg>'
      +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:\'DM Mono\',monospace;color:'+ev.color+'">'+p+'%</div></div>'
      +'<div class="event-card-info"><div class="event-card-name">'+ev.name+'</div>'
      +'<div class="event-card-meta">'+evDate+(ev.place?' · '+ev.place:'')+'</div>'
      +(ev.note?'<div style="font-size:12px;color:var(--text3);margin-top:2px">'+ev.note+'</div>':'')
      +'</div><div class="event-card-prog"><div class="event-card-pct">'+d+'/'+items.length+'</div><div class="event-card-cnt">완료</div></div></div>';
  });
  return html;
}

    +'<svg width="60" height="60" viewBox="0 0 56 56" style="flex-shrink:0"><circle cx="28" cy="28" r="'+r+'" class="ring-bg"/>'

function renderClItem(item,showPerson){
  var done=!!db.checked[item.id];
  var p=db.people.find(function(x){return x.id===item.personId;});
  var tags=item.tags.map(function(t){return '<span class="tag tag-'+t+'">'+t+'</span>';}).join('');
  var ptag=showPerson&&p?'<span class="tag tag-person">'+p.name+' '+p.title+'</span>':'';
  var dtag=item.due?'<span class="tag tag-date">'+formatDate(item.due)+'</span>':'';
  return '<div class="cl-item"><div class="chkbox'+(done?' on':'')+'" onclick="toggleCheck(\''+item.id+'\')">'
    +'<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
    +'<div class="cl-body" onclick="toggleCheck(\''+item.id+'\')">'
    +'<div class="cl-text'+(done?' done':'')+'">'+item.text+'</div>'
    +'<div class="cl-meta">'+tags+ptag+dtag+'</div></div>'
    +'<div class="cl-actions"><button class="icon-btn" onclick="openEditItemModal(\''+item.id+'\')" title="수정">✎</button>'
    +'<button class="icon-btn del" onclick="deleteItem(\''+item.id+'\')" title="삭제">✕</button></div></div>';
}

// ── TIMELINE ──
function renderTimeline(){
  var ev=db.events.find(function(e){return e.id===curEventId;});
  if(!ev) return '<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">왼쪽에서 행사를 선택하세요</div></div>';
  var html='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">';
  db.events.forEach(function(ev2){
    html+='<button class="btn sm'+(curEventId===ev2.id?' primary':'')+'" onclick="curEventId=\''+ev2.id+'\';render()"'
      +(curEventId===ev2.id?'':' style="border-color:'+ev2.color+';color:'+ev2.color+'"')+'>'+ev2.name+'</button>';
  });
  html+='</div>';
  var evItems=db.items.filter(function(i){return i.eventId===curEventId&&i.due;});
  if(!evItems.length) return html+'<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">기한이 설정된 항목이 없습니다</div></div>';
  var groups={};
  evItems.forEach(function(i){var d=i.due||'미정';if(!groups[d])groups[d]=[];groups[d].push(i);});
  var sorted=Object.keys(groups).sort();
  html+='<div class="timeline"><div class="tl-line"></div>';
  var today=new Date().toISOString().slice(0,10);
  sorted.forEach(function(date){
    var items=groups[date];
    var label=date==='미정'?'기한 미정':formatDateFull(date);
    var isToday=date===today, isPast=date<today&&date!=='미정';
    html+='<div class="tl-group"><div class="tl-dot" style="background:'+(isPast?'var(--text3)':isToday?'var(--red)':ev.color)+'"></div>'
      +'<div class="tl-date-label" style="color:'+(isPast?'var(--text3)':isToday?'var(--red)':'var(--text)')+'">'+label+(isToday?' 🔴 오늘':'')
      +'<span style="font-size:11px;font-weight:400;color:var(--text3);font-family:\'DM Mono\',monospace">'+items.length+'건</span></div>';
    items.forEach(function(item){
      var done=!!db.checked[item.id];
      var p=db.people.find(function(x){return x.id===item.personId;});
      var tags=item.tags.map(function(t){return '<span class="tag tag-'+t+'">'+t+'</span>';}).join('');
      html+='<div class="tl-item" onclick="toggleCheck(\''+item.id+'\')">'
        +'<div class="chkbox'+(done?' on':'')+'" onclick="event.stopPropagation();toggleCheck(\''+item.id+'\')">'
        +'<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        +'<div class="tl-item-body"><div class="tl-item-text'+(done?' done':'')+'">'+item.text+'</div>'
        +'<div class="tl-item-meta">'+tags+(p?'<span class="tag tag-person" style="border-left:2.5px solid '+p.color+'">'+p.name+' '+p.title+'</span>':'')+'</div></div></div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function attachImportListeners(){
  var zone=document.getElementById('uploadZone');
  var input=document.getElementById('fileInput');
  if(!zone||!input) return;

  input.addEventListener('change',function(){
    if(this.files&&this.files[0]) handleExcelFile(this.files[0]);
  });
  zone.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag');});
  zone.addEventListener('dragleave',function(){this.classList.remove('drag');});
  zone.addEventListener('drop',function(e){
    e.preventDefault();this.classList.remove('drag');
    var f=e.dataTransfer.files[0];
    if(f) handleExcelFile(f);
  });
}

function handleExcelFile(file){
  var allowed=['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    'application/vnd.ms-excel','text/csv','application/csv'];
  var ext=file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext)){
    showPreviewError('지원하지 않는 파일 형식입니다. .xlsx, .xls, .csv 파일을 사용해주세요.');
    return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',cellDates:true});
      showSheetPreview(wb, file.name);
    }catch(err){
      showPreviewError('파일을 읽을 수 없습니다: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showSheetPreview(wb, filename){
  var area=document.getElementById('previewArea');
  if(!area) return;

  // 시트 탭
  var sheetTabsHtml=wb.SheetNames.map(function(name,i){
    return '<div class="sheet-tab'+(i===0?' active':'')+'" data-sheet="'+name+'" onclick="switchSheet(this,\''+name+'\')">'+name+'</div>';
  }).join('');

  area.innerHTML='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px">'
    +'<div style="font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px">'
    +'<span style="color:var(--accent)">✓</span> '+filename+' 파일 읽기 완료</div>'

function renderSheetPreview(wb, sheetName){
  var ws=wb.Sheets[sheetName];
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  var sc=document.getElementById('sheetContent');
  if(!sc) return;

  if(!rows||rows.length<2){
    sc.innerHTML='<div class="upload-result err">데이터가 없거나 헤더만 있습니다.</div>';
    return;
  }

  // 헤더 자동 감지
  var header=rows[0].map(function(h){return String(h).trim();});
  var dataRows=rows.slice(1).filter(function(r){return r.some(function(c){return String(c).trim();});});

  // 컬럼 인덱스 자동 매핑
  var colMap=autoMapColumns(header);

  var previewRows=dataRows.slice(0,8);
  var thHtml=header.map(function(h,i){
    var mapped=Object.keys(colMap).find(function(k){return colMap[k]===i;});
    return '<th>'+h+(mapped?'<br><span style="font-size:10px;font-weight:400;color:var(--accent)">→ '+mapped+'</span>':'')+'</th>';
  }).join('');

  var tdHtml=previewRows.map(function(row){
    return '<tr>'+header.map(function(h,i){return '<td>'+(row[i]!==undefined&&row[i]!==null?String(row[i]).slice(0,40):'')+'</td>';}).join('')+'</tr>';
  }).join('');

  var mappedCount=Object.keys(colMap).length;
  var importHtml='';
  if(mappedCount>0){
    importHtml='<div style="margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
      +'<div style="font-size:13px;color:var(--text2)">총 <strong>'+dataRows.length+'행</strong> 감지 · 매핑된 열: <strong>'+mappedCount+'개</strong></div>'
      +'<button class="btn primary" onclick="prepareImport(\''+sheetName+'\')">이 시트 가져오기 →</button></div>';
  } else {
    importHtml='<div class="upload-result err" style="margin-top:10px">인식 가능한 열을 찾지 못했습니다. 아래 템플릿 형식을 확인해주세요.</div>';
  }

  sc.innerHTML='<div class="preview-scroll"><table class="preview-table"><thead><tr>'+thHtml+'</tr></thead><tbody>'+tdHtml+'</tbody></table></div>'
    +(dataRows.length>8?'<div style="font-size:12px;color:var(--text3);margin-top:6px;text-align:right">…외 '+(dataRows.length-8)+'행 더 있음</div>':'')
    +importHtml;

  sc._sheetName=sheetName;
  sc._wb=document.getElementById('previewArea')._wb;
}

// 컬럼 자동 매핑
function autoMapColumns(header){
  var map={};
  var rules={
    '업무내용':['업무내용','업무 내용','task','내용','할일','할 일','업무'],
    '담당자':['담당자','담당','person','이름','name','담당자명'],
    '섹션':['섹션','section','구분','카테고리','분류','그룹'],
    '기한':['기한','마감','due','날짜','date','마감일','기한일'],
    '태그':['태그','tag','tags','분류','카테고리','유형']
  };
  Object.keys(rules).forEach(function(key){
    rules[key].forEach(function(kw){
      if(map[key]!==undefined) return;
      header.forEach(function(h,i){
        if(map[key]!==undefined) return;
        if(h.toLowerCase().replace(/\s/g,'')===kw.toLowerCase().replace(/\s/g,'')) map[key]=i;
      });
    });
  });
  return map;
}

function prepareImport(sheetName){
  var area=document.getElementById('previewArea');
  if(!area||!area._wb) return;
  var wb=area._wb;
  var ws=wb.Sheets[sheetName];
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!rows||rows.length<2){alert('데이터가 없습니다.');return;}
  var header=rows[0].map(function(h){return String(h).trim();});
  var dataRows=rows.slice(1).filter(function(r){return r.some(function(c){return String(c).trim();});});
  var colMap=autoMapColumns(header);

  if(colMap['업무내용']===undefined){
    alert('업무내용 열을 찾을 수 없습니다.\n헤더에 "업무내용" 또는 "업무 내용" 열이 있는지 확인해주세요.');
    return;
  }

  var eventId=document.getElementById('importEventSel').value;
  if(!eventId){alert('가져올 행사를 선택해주세요.');return;}

  // 파싱
  var parsed=dataRows.map(function(row){
    var text=colMap['업무내용']!==undefined?String(row[colMap['업무내용']]||'').trim():'';
    var person=colMap['담당자']!==undefined?String(row[colMap['담당자']]||'').trim():'';
    var section=colMap['섹션']!==undefined?String(row[colMap['섹션']]||'').trim():'';
    var due=colMap['기한']!==undefined?parseExcelDate(row[colMap['기한']]):'';
    var tagsRaw=colMap['태그']!==undefined?String(row[colMap['태그']]||'').trim():'';
    var tags=tagsRaw?tagsRaw.split(/[,，、]/).map(function(t){return t.trim();}).filter(Boolean):[];
    return {text,person,section,due,tags};
  }).filter(function(r){return r.text;});

  if(!parsed.length){alert('가져올 수 있는 항목이 없습니다.');return;}

  // 새 담당자, 섹션 예측
  var newPersons=[],newSections=[];
  var personMap={};
  parsed.forEach(function(r){
    if(!r.person) return;
    var found=db.people.find(function(p){return p.name===r.person||p.name+p.title===r.person;});
    if(!found&&!personMap[r.person]){personMap[r.person]=true;newPersons.push(r.person);}
  });
  var sectionMap={};
  parsed.forEach(function(r){
    if(!r.section) return;
    var key=(r.person||'')+'__'+r.section;
    if(!sectionMap[key]){sectionMap[key]=true;newSections.push({person:r.person||'',section:r.section});}
  });

  importPending={parsed,eventId};
  var summaryHtml='<table style="width:100%;border-collapse:collapse;font-size:13px">'
    +'<tr><td style="padding:5px 0;color:var(--text2);width:50%">가져올 항목 수</td><td style="font-weight:700">'+parsed.length+'개</td></tr>'
    +(newPersons.length?'<tr><td style="padding:5px 0;color:var(--text2)">새로 생성될 담당자</td><td style="font-weight:700;color:var(--blue)">'+newPersons.join(', ')+'</td></tr>':'')
    +(newSections.length?'<tr><td style="padding:5px 0;color:var(--text2)">새로 생성될 섹션</td><td style="font-weight:700;color:var(--amber)">'+newSections.length+'개</td></tr>':'')
    +'<tr><td style="padding:5px 0;color:var(--text2)">가져올 행사</td><td style="font-weight:700">'+(db.events.find(function(e){return e.id===eventId;})||{}).name||eventId+'</td></tr>'
    +'</table>';
  document.getElementById('importSummary').innerHTML=summaryHtml;
  openModal('importConfirmModal');
}

function confirmImport(){
  if(!importPending) return;
  var parsed=importPending.parsed, eventId=importPending.eventId;
  var colorIdx=0;
  var now=Date.now();

  parsed.forEach(function(r,i){
    // 담당자 찾거나 생성
    var person=null;
    if(r.person){
      person=db.people.find(function(p){return p.name===r.person;});
      if(!person){
        person={id:uid(),name:r.person,title:'',role:'',color:COLORS[colorIdx%COLORS.length]};
        db.people.push(person);
        colorIdx++;
      }
    }

    // 섹션 찾거나 생성
    var section=null;
    var sectionTitle=r.section||'기타';
    if(person){
      section=db.sections.find(function(s){return s.eventId===eventId&&s.personId===person.id&&s.title===sectionTitle;});
      if(!section){
        var order=db.sections.filter(function(s){return s.eventId===eventId&&s.personId===person.id;}).length;
        section={id:uid(),eventId,personId:person.id,title:sectionTitle,order};
        db.sections.push(section);
      }
    }

    db.items.push({
      id:uid(),
      eventId,
      personId:person?person.id:'',
      sectionId:section?section.id:'',
      text:r.text,
      tags:r.tags,
      due:r.due||null
    });
  });

  saveDB();
  closeModal('importConfirmModal');
  importPending=null;

  // 완료 알림 표시
  var area=document.getElementById('previewArea');
  if(area){
    area.innerHTML='<div class="upload-result ok" style="padding:16px 18px;font-size:14px">'
      +'✅ <strong>'+parsed.length+'개 항목</strong>을 성공적으로 가져왔습니다! '
      +'<button class="btn sm primary" style="margin-left:12px" onclick="setView(\'checklist\',\''+eventId+'\')">체크리스트 보기 →</button></div>';
  }
  render();
}

function parseExcelDate(val){
  if(!val) return '';
  if(val instanceof Date){
    return val.toISOString().slice(0,10);
  }
  if(typeof val==='number'&&val>10000){
    // Excel serial date
    var d=new Date(Math.round((val-25569)*86400*1000));
    return d.toISOString().slice(0,10);
  }
  var s=String(val).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(/^\d{4}\/\d{2}\/\d{2}$/.test(s)) return s.replace(/\//g,'-');
  if(/^\d{4}\.\d{2}\.\d{2}$/.test(s)) return s.replace(/\./g,'-');
  var d2=new Date(s);
  if(!isNaN(d2)) return d2.toISOString().slice(0,10);
  return '';
}

function showPreviewError(msg){

function editSectionTitle(id){
  var s=db.sections.find(function(x){return x.id===id;});if(!s) return;
  var v=prompt('섹션명 수정:',s.title);
  if(v&&v.trim()){s.title=v.trim();saveDB();render();}
}

// ═══════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function setColorOpt(containerId,color){
  document.querySelectorAll('#'+containerId+' .color-opt').forEach(function(el){el.classList.toggle('sel',el.dataset.color===color);});
}
function attachTagListeners(){
  document.querySelectorAll('#im_tags .tag-check').forEach(function(label){
    label.onclick=function(){this.classList.toggle('sel');this.querySelector('input').checked=this.classList.contains('sel');};
  });
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function formatDate(d){if(!d) return '';var dt=new Date(d);return (dt.getMonth()+1)+'/'+(dt.getDate());}
function formatDateFull(d){if(!d) return '';return new Date(d).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',function(){
  loadDB();
  render();
  document.querySelectorAll('.backdrop').forEach(function(b){
    b.addEventListener('click',function(e){if(e.target===this) this.classList.remove('show');});
  });
  document.querySelectorAll('.color-options').forEach(function(container){
    container.addEventListener('click',function(e){
      var opt=e.target.closest('.color-opt');if(!opt) return;
      container.querySelectorAll('.color-opt').forEach(function(o){o.classList.remove('sel');});
      opt.classList.add('sel');
    });
  });
});
</script>
