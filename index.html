<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려견순찰대연합회 — 행사 운영 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f5f1;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e7e0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--border3:rgba(0,0,0,0.22);
  --text:#181816;--text2:#54544e;--text3:#98988f;
  --accent:#2d6a4f;--accent2:#d8f3e3;--accent3:#1b4332;
  --blue:#1565c0;--blue2:#e3f2fd;
  --red:#c62828;--red2:#ffebee;
  --amber:#b45309;--amber2:#fef3c7;
  --purple:#6b21a8;--purple2:#f3e8ff;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* ── SIDEBAR ── */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo-mark{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.sidebar-org{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.sidebar-name{font-size:14px;font-weight:700;color:var(--text)}
.sidebar-section{padding:12px 10px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--rs);margin:1px 6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .12s;border:none;background:transparent;width:calc(100% - 12px);text-align:left;font-family:'Noto Sans KR',sans-serif}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent2);color:var(--accent3)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.event-list{padding:4px 6px}
.event-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin-bottom:1px}
.event-item:hover{background:var(--surface2)}
.event-item.active{background:var(--accent2);color:var(--accent3);font-weight:500}
.event-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:12px 6px;border-top:1px solid var(--border)}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
.content{padding:24px;flex:1}

/* ── BUTTONS ── */
.btn{padding:7px 14px;font-size:13px;font-weight:500;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .13s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:#235c42}
.btn.danger{background:var(--red2);color:var(--red);border-color:transparent}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.ghost{border-color:transparent;color:var(--text3)}
.btn.ghost:hover{background:var(--surface2);color:var(--text)}

/* ── TABS (sub) ── */
.subtabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--rs);padding:3px;margin-bottom:20px;width:fit-content}
.subtab{padding:6px 14px;font-size:13px;border-radius:5px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .12s}
.subtab.active{background:var(--surface);color:var(--text);box-shadow:var(--sh)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.card+.card{margin-top:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── PROGRESS ── */
.progress-ring{display:flex;align-items:center;gap:14px}
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:5}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .4s}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}

/* ── CHECKLIST ITEM ── */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:box-shadow .13s,border-color .13s;position:relative}
.cl-item:hover{box-shadow:var(--sh);border-color:var(--border2)}
.chkbox{width:20px;height:20px;min-width:20px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:1px;cursor:pointer;transition:all .13s;flex-shrink:0}
.chkbox:hover{border-color:var(--accent)}
.chkbox.on{background:var(--accent);border-color:var(--accent)}
.chkbox svg{display:none}
.chkbox.on svg{display:block}
.cl-body{flex:1;min-width:0;cursor:pointer}
.cl-text{font-size:14px;color:var(--text);line-height:1.45;transition:all .2s}
.cl-text.done{text-decoration:line-through;text-decoration-color:var(--text3);color:var(--text3)}
.cl-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-사전{background:var(--accent2);color:var(--accent3)}
.tag-당일{background:var(--blue2);color:var(--blue)}
.tag-긴급{background:var(--red2);color:var(--red)}
.tag-홍보{background:var(--amber2);color:var(--amber)}
.tag-계약{background:var(--purple2);color:var(--purple)}
.tag-person{background:var(--surface2);color:var(--text2)}
.tag-date{background:var(--surface2);color:var(--text2);font-family:'DM Mono',monospace}
.cl-actions{display:none;gap:3px;flex-shrink:0}
.edit-on .cl-item:hover .cl-actions{display:flex}
.icon-btn{width:28px;height:28px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .13s;font-size:13px}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.del:hover{background:var(--red2);color:var(--red)}

/* ── SECTION ── */
.sec{margin-bottom:20px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.sec-prog{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}
.sec-actions{display:flex;gap:4px}
.add-item-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:'Noto Sans KR',sans-serif;opacity:0;transition:opacity .13s}
.sec:hover .add-item-btn{opacity:1}
.add-item-btn:hover{background:var(--accent2)}
.add-sec-btn{width:100%;padding:9px;border:1.5px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .13s;margin-top:6px;display:none}
.edit-on .add-sec-btn{display:block}
.add-sec-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2)}

/* ── PERSON HEADER ── */
.person-hd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.person-name-el{font-size:16px;font-weight:700}
.person-role-el{font-size:13px;color:var(--text2);margin-top:2px}
.person-stat{margin-left:auto;text-align:right}
.person-pct{font-size:22px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace}
.person-cnt{font-size:12px;color:var(--text3)}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:28px}
.tl-line{position:absolute;left:10px;top:0;bottom:0;width:1.5px;background:var(--border)}
.tl-group{margin-bottom:28px}
.tl-date-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.tl-dot{position:absolute;left:4px;width:13px;height:13px;border-radius:50%;background:var(--accent);border:2.5px solid var(--surface);margin-top:2px}
.tl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:box-shadow .13s}
.tl-item:hover{box-shadow:var(--sh);border-color:var(--border2)}
.tl-item-body{flex:1;min-width:0}
.tl-item-text{font-size:14px;color:var(--text);line-height:1.45}
.tl-item-text.done{text-decoration:line-through;color:var(--text3)}
.tl-item-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;text-align:center}
.stat-n{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px}
.stat-card.hi .stat-n{color:var(--accent)}

/* ── SETTINGS ── */
.setting-section{margin-bottom:28px}
.setting-title{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)}
.setting-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.setting-row-info{flex:1}
.setting-row-name{font-size:14px;font-weight:500}
.setting-row-sub{font-size:12px;color:var(--text3);margin-top:1px}
.color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* ── EVENT CARD ── */
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:box-shadow .13s;cursor:pointer}
.event-card:hover{box-shadow:var(--sh2);border-color:var(--border2)}
.event-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-card-info{flex:1}
.event-card-name{font-size:15px;font-weight:700}
.event-card-meta{font-size:12px;color:var(--text3);margin-top:3px}
.event-card-prog{text-align:right}
.event-card-pct{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}
.event-card-cnt{font-size:11px;color:var(--text3)}

/* ── MODAL ── */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px}
.backdrop.show{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:500px;box-shadow:var(--sh2);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .13s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag-group{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.tag-check{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;padding:4px 10px;border:1px solid var(--border2);border-radius:20px;transition:all .13s;user-select:none}
.tag-check input{display:none}
.tag-check.sel{border-color:var(--accent);background:var(--accent2);color:var(--accent3)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.color-options{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .13s}
.color-opt.sel{border-color:var(--text)}

/* ── EDIT BANNER ── */
.edit-banner{display:none;background:var(--amber2);border-bottom:1px solid #fcd34d;padding:9px 24px;font-size:13px;color:var(--amber);align-items:center;gap:8px}
.edit-banner.show{display:flex}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:14px}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .sidebar{display:none}
  .content{padding:16px 12px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-mark">🐾</div>
    <div class="sidebar-org">반려견순찰대연합회</div>
    <div class="sidebar-name">행사 운영 관리</div>
  </div>
  <div class="sidebar-section">메뉴</div>
  <button class="nav-item active" data-view="dashboard" onclick="setView('dashboard')"><span class="nav-icon">🏠</span>대시보드</button>
  <button class="nav-item" data-view="checklist" onclick="setView('checklist')"><span class="nav-icon">✅</span>R&R 체크리스트</button>
  <button class="nav-item" data-view="timeline" onclick="setView('timeline')"><span class="nav-icon">📅</span>타임라인</button>
  <button class="nav-item" data-view="settings" onclick="setView('settings')"><span class="nav-icon">⚙️</span>설정</button>
  <div class="sidebar-section" style="margin-top:8px">행사 목록</div>
  <div class="event-list" id="sidebarEvents"></div>
  <div class="sidebar-bottom">
    <button class="btn sm primary" style="width:100%;justify-content:center" onclick="openNewEventModal()">+ 행사 추가</button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">대시보드</div>
      <div class="topbar-sub" id="topbarSub">전체 행사 현황</div>
    </div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <div class="edit-banner" id="editBanner">✏️ 편집 모드 — 항목에 마우스를 올리면 수정·삭제 버튼이 나타납니다</div>
  <div class="content" id="mainContent"></div>
</div>

</div>

<!-- ─── MODALS ─── -->
<!-- 행사 추가/수정 -->
<div class="backdrop" id="eventModal">
<div class="modal">
  <h3 id="eventModalTitle">행사 추가</h3>
  <div class="form-group"><label class="form-label">행사명</label><input class="form-input" id="em_name" placeholder="예: 2026 반려견 걷기대회"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">행사일</label><input class="form-input" id="em_date" type="date"></div>
    <div class="form-group"><label class="form-label">장소</label><input class="form-input" id="em_place" placeholder="예: 안산 호수공원"></div>
  </div>
  <div class="form-group"><label class="form-label">색상</label>
    <div class="color-options" id="em_colors">
      <div class="color-opt sel" data-color="#2d6a4f" style="background:#2d6a4f"></div>
      <div class="color-opt" data-color="#1565c0" style="background:#1565c0"></div>
      <div class="color-opt" data-color="#b45309" style="background:#b45309"></div>
      <div class="color-opt" data-color="#c62828" style="background:#c62828"></div>
      <div class="color-opt" data-color="#6b21a8" style="background:#6b21a8"></div>
      <div class="color-opt" data-color="#0e7490" style="background:#0e7490"></div>
    </div>
  </div>
  <div class="form-group"><label class="form-label">메모</label><textarea class="form-textarea" id="em_note" rows="2" placeholder="행사 설명"></textarea></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('eventModal')">취소</button>
    <button class="btn primary" onclick="saveEvent()">저장</button>
  </div>
</div>
</div>

<!-- 담당자 추가/수정 -->
<div class="backdrop" id="personModal">
<div class="modal">
  <h3 id="personModalTitle">담당자 추가</h3>
  <div class="form-row">
    <div class="form-group"><label class="form-label">이름</label><input class="form-input" id="pm_name" placeholder="예: 김지민"></div>
    <div class="form-group"><label class="form-label">직함</label><input class="form-input" id="pm_title" placeholder="예: 대표, 팀장"></div>
  </div>
  <div class="form-group"><label class="form-label">담당 역할</label><input class="form-input" id="pm_role" placeholder="예: 총괄, 마케팅 총괄"></div>
  <div class="form-group"><label class="form-label">색상</label>
    <div class="color-options" id="pm_colors">
      <div class="color-opt sel" data-color="#2d6a4f" style="background:#2d6a4f"></div>
      <div class="color-opt" data-color="#1565c0" style="background:#1565c0"></div>
      <div class="color-opt" data-color="#b45309" style="background:#b45309"></div>
      <div class="color-opt" data-color="#c62828" style="background:#c62828"></div>
      <div class="color-opt" data-color="#6b21a8" style="background:#6b21a8"></div>
      <div class="color-opt" data-color="#0e7490" style="background:#0e7490"></div>
      <div class="color-opt" data-color="#9a3412" style="background:#9a3412"></div>
      <div class="color-opt" data-color="#374151" style="background:#374151"></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('personModal')">취소</button>
    <button class="btn primary" onclick="savePerson()">저장</button>
  </div>
</div>
</div>

<!-- 항목 추가/수정 -->
<div class="backdrop" id="itemModal">
<div class="modal">
  <h3 id="itemModalTitle">항목 추가</h3>
  <div class="form-group"><label class="form-label">업무 내용</label><textarea class="form-textarea" id="im_text" rows="3" placeholder="업무 내용을 입력하세요"></textarea></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">담당자</label>
      <select class="form-select" id="im_person"></select>
    </div>
    <div class="form-group"><label class="form-label">기한 (선택)</label><input class="form-input" id="im_date" type="date"></div>
  </div>
  <div class="form-group"><label class="form-label">태그</label>
    <div class="tag-group" id="im_tags">

    {s:'s17',p:'p7',t:'안전관리 신고 서류 작성 및 제출',tags:['사전','긴급','계약'],daysB:28},
    {s:'s17',p:'p7',t:'참가자 개인정보 처리 동의서 양식 준비',tags:['사전','계약'],daysB:21},
    {s:'s17',p:'p7',t:'행사 관련 지자체 허가·신고 서류 처리',tags:['사전','계약'],daysB:21},
    {s:'s18',p:'p7',t:'외부 인력 57명 계약 및 지급 일정 정리',tags:['사전','계약'],daysB:28},
    {s:'s18',p:'p7',t:'협찬 물품 수령증·세금계산서 수취 및 보관',tags:['사전','계약'],daysB:14},
    {s:'s18',p:'p7',t:'행사 예산 집행 내역 실시간 관리',tags:['사전'],daysB:14},
    {s:'s19',p:'p7',t:'현장 계약 관련 문의 대응 및 서류 지원',tags:['당일'],daysB:0},
    {s:'s19',p:'p7',t:'행사 종료 후 정산 서류 취합 및 마감',tags:['당일'],daysB:0},
    {s:'s19',p:'p7',t:'협력사 미지급 비용 정산 처리',tags:['당일'],daysB:0},
    {s:'s19',p:'p7',t:'결과 보고서용 지출 내역 정리',tags:['당일'],daysB:0},
  ];
  return raw.map((r,i)=>{
    const ev = SEED.events[0];
    const d = new Date(ev.date);
    let due = null;
    if(r.daysB > 0){ d.setDate(d.getDate()-r.daysB); due = d.toISOString().slice(0,10); d.setTime(new Date(ev.date).getTime()); }
    else if(r.daysB === 0){ due = ev.date; }
    return {id:'i'+i,sectionId:r.s,personId:r.p,eventId:'e1',text:r.t,tags:r.tags,due};
  });
}

// STATE
// ═══════════════════════════════════════════
let curView = 'dashboard';
let curEventId = 'e1';
let curPersonId = null;
let editMode = false;
let itemModalCtx = null;
let sectionModalCtx = null;
let eventModalCtx = null;
let personModalCtx = null;

function loadDB(){
  try{
    const s = localStorage.getItem('pms_db_v1');
    if(s){ const d=JSON.parse(s); db=d; }
    else { db=JSON.parse(JSON.stringify(SEED)); db.items=buildItems(); db.checked={}; }
  }catch(e){ db=JSON.parse(JSON.stringify(SEED)); db.items=buildItems(); db.checked={}; }
}
function saveDB(){ try{localStorage.setItem('pms_db_v1',JSON.stringify(db));}catch(e){} }

function uid(){ return 'x'+Math.random().toString(36).slice(2,9); }

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
function setView(v, eid){
  curView=v;
  if(eid) curEventId=eid;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  if(editMode && v!=='checklist') toggleEditMode(false);
  render();
}

function render(){
  renderSidebarEvents();
  renderTopbar();
  renderContent();
}

function renderSidebarEvents(){
  const el = document.getElementById('sidebarEvents');
  el.innerHTML = db.events.map(ev=>`
    <div class="event-item${curEventId===ev.id?' active':''}" onclick="setView('checklist','${ev.id}')">
      <div class="event-dot" style="background:${ev.color}"></div>
      <span>${ev.name}</span>
    </div>`).join('');
}

function renderTopbar(){
  const titles = {dashboard:'대시보드',checklist:'R&R 체크리스트',timeline:'타임라인',settings:'설정'};
  const subs = {dashboard:'전체 행사 현황',checklist:curEventId?db.events.find(e=>e.id===curEventId)?.name||'':'',timeline:curEventId?db.events.find(e=>e.id===curEventId)?.name||'':'',settings:'행사·담당자 관리'};
  document.getElementById('topbarTitle').textContent = titles[curView]||'';
  document.getElementById('topbarSub').textContent = subs[curView]||'';
  const act = document.getElementById('topbarActions');
  if(curView==='checklist'){
    act.innerHTML=`<button class="btn${editMode?' primary':' ghost'}" onclick="toggleEditMode()"><span>${editMode?'✅':'✏️'}</span>${editMode?'편집 완료':'편집 모드'}</button>
    <button class="btn sm" onclick="resetChecks()">초기화</button>`;
  } else if(curView==='dashboard'){
    act.innerHTML=`<button class="btn primary" onclick="openNewEventModal()">+ 행사 추가</button>`;
  } else if(curView==='settings'){
    act.innerHTML=`<button class="btn primary" onclick="openPersonModal()">+ 담당자 추가</button>`;
  } else { act.innerHTML=''; }
}

// ═══════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════
function renderContent(){
  const el = document.getElementById('mainContent');
  const banner = document.getElementById('editBanner');
  banner.className = (editMode && curView==='checklist') ? 'edit-banner show' : 'edit-banner';
  if(curView==='dashboard') el.innerHTML=renderDashboard();
  else if(curView==='checklist') el.innerHTML=renderChecklist();
  else if(curView==='timeline') el.innerHTML=renderTimeline();
  else if(curView==='settings') el.innerHTML=renderSettings();
  if(editMode) el.classList.add('edit-on'); else el.classList.remove('edit-on');
  attachTagListeners();
}

// ── DASHBOARD ──
function renderDashboard(){
  const total = db.items.length;
  const done = db.items.filter(i=>db.checked[i.id]).length;
  const pct = total?Math.round(done/total*100):0;
  let html = `<div class="stats-row">
    <div class="stat-card hi"><div class="stat-n">${db.events.length}</div><div class="stat-l">총 행사</div></div>
    <div class="stat-card hi"><div class="stat-n">${pct}%</div><div class="stat-l">전체 진행률</div></div>
    <div class="stat-card"><div class="stat-n">${done}</div><div class="stat-l">완료 항목</div></div>
    <div class="stat-card"><div class="stat-n">${total-done}</div><div class="stat-l">미완료 항목</div></div>
    <div class="stat-card"><div class="stat-n">${db.people.length}</div><div class="stat-l">담당자</div></div>
  </div>`;
  html += `<div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text2)">행사 목록</div>`;
  if(!db.events.length) return html+`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">등록된 행사가 없습니다</div></div>`;
  db.events.forEach(ev=>{
    const items = db.items.filter(i=>i.eventId===ev.id);
    const d = items.filter(i=>db.checked[i.id]).length;
    const p = items.length?Math.round(d/items.length*100):0;
    const evDate = ev.date ? new Date(ev.date).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '';
    const r = 22; const circ = 2*Math.PI*r;
    const offset = circ*(1-p/100);
    html+=`<div class="event-card" onclick="setView('checklist','${ev.id}')">
      <div style="width:56px;height:56px;flex-shrink:0;position:relative">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="${r}" class="ring-bg"/>
          <circle cx="28" cy="28" r="${r}" fill="none" stroke="${ev.color}" stroke-width="5" stroke-linecap="round"
            transform="rotate(-90 28 28)" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .4s"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;color:${ev.color}">${p}%</div>
      </div>
      <div class="event-card-info">
        <div class="event-card-name">${ev.name}</div>
        <div class="event-card-meta">${evDate}${ev.place?' · '+ev.place:''}</div>
        ${ev.note?`<div style="font-size:12px;color:var(--text3);margin-top:2px">${ev.note}</div>`:''}
      </div>
      <div class="event-card-prog">
        <div class="event-card-pct">${d}/${items.length}</div>
        <div class="event-card-cnt">완료</div>
      </div>
      ${editMode?`<button class="btn sm ghost" onclick="event.stopPropagation();openEditEventModal('${ev.id}')">수정</button>
      <button class="btn sm danger" onclick="event.stopPropagation();deleteEvent('${ev.id}')">삭제</button>`:''}
    </div>`;
  });
  return html;
}

// ── CHECKLIST ──
function renderChecklist(){
  const ev = db.events.find(e=>e.id===curEventId);
  if(!ev) return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">왼쪽에서 행사를 선택하거나 새 행사를 추가하세요</div></div>`;

  const evItems = db.items.filter(i=>i.eventId===curEventId);
  const done = evItems.filter(i=>db.checked[i.id]).length;
  const pct = evItems.length?Math.round(done/evItems.length*100):0;
  const r=22,circ=2*Math.PI*r,offset=circ*(1-pct/100);

  let html = `<div class="card" style="margin-bottom:20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <svg width="60" height="60" viewBox="0 0 56 56" style="flex-shrink:0">
      <circle cx="28" cy="28" r="${r}" class="ring-bg"/>
      <circle cx="28" cy="28" r="${r}" fill="none" stroke="${ev.color}" stroke-width="5" stroke-linecap="round"
        transform="rotate(-90 28 28)" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      <text x="28" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="${ev.color}" font-family="DM Mono,monospace">${pct}%</text>
    </svg>
    <div style="flex:1;min-width:0">
      <div style="font-size:16px;font-weight:700">${ev.name}</div>
      <div style="font-size:13px;color:var(--text3);margin-top:2px">${ev.date?new Date(ev.date).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}):''} ${ev.place?'· '+ev.place:''}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">`;
  db.people.forEach(p=>{
    const pit=evItems.filter(i=>i.personId===p.id);
    const pd=pit.filter(i=>db.checked[i.id]).length;
    html+=`<div style="text-align:center;cursor:pointer;padding:6px 10px;border-radius:var(--rs);transition:background .12s" onclick="scrollToPerson('${p.id}')"
      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
      <div style="width:32px;height:32px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;margin:0 auto">${p.name.slice(0,1)}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace">${pd}/${pit.length}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // 담당자별 섹션
  if(!db.people.length) return html+`<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">설정에서 담당자를 추가하세요</div></div>`;

  db.people.forEach(p=>{
    const pit = evItems.filter(i=>i.personId===p.id);
    const pd = pit.filter(i=>db.checked[i.id]).length;
    const pp = pit.length?Math.round(pd/pit.length*100):0;
    const secs = db.sections.filter(s=>s.eventId===curEventId&&s.personId===p.id).sort((a,b)=>a.order-b.order);

    html+=`<div id="person-${p.id}" style="margin-bottom:28px">
      <div class="person-hd">
        <div class="avatar" style="background:${p.color}">${p.name.slice(0,1)}</div>
        <div>
          <div class="person-name-el" ${editMode?`onclick="openEditPersonModal('${p.id}')" style="cursor:pointer" title="클릭하여 수정"`:''}>${p.name} ${p.title}</div>
          <div class="person-role-el">${p.role}</div>
        </div>
        <div class="person-stat">
          <div class="person-pct">${pp}%</div>
          <div class="person-cnt">${pd} / ${pit.length} 완료</div>
        </div>
      </div>`;

    secs.forEach(s=>{
      const sit = pit.filter(i=>i.sectionId===s.id);
      const sd = sit.filter(i=>db.checked[i.id]).length;
      html+=`<div class="sec">
        <div class="sec-hd">
          <div class="sec-title">
            <span ${editMode?`onclick="editSectionTitle('${s.id}')" style="cursor:pointer" title="클릭하여 수정"`:''}>${s.title}</span>
            <span class="sec-prog">${sd}/${sit.length}</span>
          </div>
          <div class="sec-actions">
            ${editMode?`<button class="add-item-btn" onclick="openAddItemModal('${curEventId}','${p.id}','${s.id}')">+ 항목</button>
            <button class="icon-btn del" onclick="deleteSec('${s.id}')" title="섹션 삭제">✕</button>`:''}
          </div>
        </div>`;
      sit.forEach(item=>{
        html+=renderClItem(item,false);
      });
      html+=`</div>`;
    });

    if(editMode) html+=`<button class="add-sec-btn" onclick="openAddSectionModal('${curEventId}','${p.id}')">+ 섹션 추가</button>`;
    html+=`</div>`;
  });

  if(editMode) html+=`<div style="margin-top:8px"><button class="btn primary" onclick="openAddItemModal('${curEventId}',null,null)">+ 항목 추가 (담당자 선택)</button></div>`;
  return html;
}

function renderClItem(item, showPerson){
  const done=!!db.checked[item.id];
  const p=db.people.find(x=>x.id===item.personId);
  const tags=item.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('');
  const ptag=showPerson&&p?`<span class="tag tag-person">${p.name} ${p.title}</span>`:'';
  const dtag=item.due?`<span class="tag tag-date">${formatDate(item.due)}</span>`:'';
  return `<div class="cl-item">
    <div class="chkbox${done?' on':''}" onclick="toggleCheck('${item.id}')">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cl-body" onclick="toggleCheck('${item.id}')">
      <div class="cl-text${done?' done':''}">${item.text}</div>
      <div class="cl-meta">${tags}${ptag}${dtag}</div>
    </div>
    <div class="cl-actions">
      <button class="icon-btn" onclick="openEditItemModal('${item.id}')" title="수정">✎</button>
      <button class="icon-btn del" onclick="deleteItem('${item.id}')" title="삭제">✕</button>
    </div>
  </div>`;
}

// ── TIMELINE ──
function renderTimeline(){
  const ev = db.events.find(e=>e.id===curEventId);
  if(!ev) return `<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">왼쪽에서 행사를 선택하세요</div></div>`;

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:8px;flex-wrap:wrap">`;
  db.events.forEach(ev2=>{
    html+=`<button class="btn sm${curEventId===ev2.id?' primary':''}" onclick="curEventId='${ev2.id}';render()" style="${curEventId===ev2.id?'':'border-color:'+ev2.color+';color:'+ev2.color}">${ev2.name}</button>`;
  });
  html+=`</div></div>`;

  const evItems = db.items.filter(i=>i.eventId===curEventId&&i.due);
  if(!evItems.length) return html+`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">기한이 설정된 항목이 없습니다</div></div>`;

  // group by due date
  const groups={};
  evItems.forEach(i=>{
    const d=i.due||'미정';
    if(!groups[d]) groups[d]=[];
    groups[d].push(i);
  });
  const sorted=Object.keys(groups).sort();

  html+=`<div class="timeline"><div class="tl-line"></div>`;
  sorted.forEach(date=>{
    const items=groups[date];
    const label=date==='미정'?'기한 미정':formatDateFull(date);
    const isToday=date===new Date().toISOString().slice(0,10);
    const isPast=date<new Date().toISOString().slice(0,10)&&date!=='미정';
    html+=`<div class="tl-group">
      <div class="tl-dot" style="background:${isPast?'var(--text3)':isToday?'var(--red)':ev.color}"></div>
      <div class="tl-date-label" style="color:${isPast?'var(--text3)':isToday?'var(--red)':'var(--text)'}">
        ${label}${isToday?' 🔴 오늘':''}
        <span style="font-size:11px;font-weight:400;color:var(--text3);font-family:'DM Mono',monospace">${items.length}건</span>
      </div>`;
    items.forEach(item=>{
      const done=!!db.checked[item.id];
      const p=db.people.find(x=>x.id===item.personId);
      const tags=item.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('');
      html+=`<div class="tl-item" onclick="toggleCheck('${item.id}')">
        <div class="chkbox${done?' on':''}" onclick="event.stopPropagation();toggleCheck('${item.id}')">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="tl-item-body">
          <div class="tl-item-text${done?' done':''}">${item.text}</div>
          <div class="tl-item-meta">
            ${tags}
            ${p?`<span class="tag tag-person" style="border-left:2.5px solid ${p.color}">${p.name} ${p.title}</span>`:''}
          </div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function toggleCheck(id){
  db.checked[id]=!db.checked[id];
  saveDB(); render();
}

function resetChecks(){
  if(!confirm('이 행사의 모든 체크를 초기화할까요?')) return;
  db.items.filter(i=>i.eventId===curEventId).forEach(i=>delete db.checked[i.id]);
  saveDB(); render();
}

function toggleEditMode(val){
  editMode = val!==undefined ? val : !editMode;
  render();
}

function scrollToPerson(pid){
  const el=document.getElementById('person-'+pid);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

function hardReset(){
  if(!confirm('모든 데이터를 초기화할까요? 되돌릴 수 없습니다.')) return;
  localStorage.removeItem('pms_db_v1');
  location.reload();
}

function openNewEventModal(){
  eventModalCtx=null;
  document.getElementById('eventModalTitle').textContent='행사 추가';
  document.getElementById('em_name').value='';
  document.getElementById('em_date').value='';
  document.getElementById('em_place').value='';
  document.getElementById('em_note').value='';
  setColorOpt('em_colors','#2d6a4f');
  openModal('eventModal');
}
function openEditEventModal(id){
  const ev=db.events.find(e=>e.id===id);
  if(!ev) return;
  eventModalCtx=id;
  document.getElementById('eventModalTitle').textContent='행사 수정';
  document.getElementById('em_name').value=ev.name;
  document.getElementById('em_date').value=ev.date||'';
  document.getElementById('em_place').value=ev.place||'';
  document.getElementById('em_note').value=ev.note||'';
  setColorOpt('em_colors',ev.color);
  openModal('eventModal');
}
function saveEvent(){
  const name=document.getElementById('em_name').value.trim();
  if(!name){alert('행사명을 입력하세요');return;}
  const color=document.querySelector('#em_colors .color-opt.sel')?.dataset.color||'#2d6a4f';
  const obj={name,date:document.getElementById('em_date').value,place:document.getElementById('em_place').value.trim(),color,note:document.getElementById('em_note').value.trim()};
  if(eventModalCtx){
    const ev=db.events.find(e=>e.id===eventModalCtx);
    if(ev) Object.assign(ev,obj);
  } else {
    obj.id=uid();
    db.events.push(obj);
    curEventId=obj.id;
  }
  saveDB(); closeModal('eventModal'); render();
}
function deleteEvent(id){
  if(!confirm('이 행사와 모든 항목을 삭제할까요?')) return;
  db.events=db.events.filter(e=>e.id!==id);
  db.items=db.items.filter(i=>i.eventId!==id);
  db.sections=db.sections.filter(s=>s.eventId!==id);
  if(curEventId===id) curEventId=db.events[0]?.id||null;
  saveDB(); render();
}

// ═══════════════════════════════════════════
// ITEM MODAL
// ═══════════════════════════════════════════
function openAddItemModal(eventId, personId, sectionId){
  itemModalCtx={eventId,personId,sectionId,itemId:null};
  document.getElementById('itemModalTitle').textContent='항목 추가';
  document.getElementById('im_text').value='';
  document.getElementById('im_date').value='';
  fillPersonSelect(personId);
  document.querySelectorAll('#im_tags .tag-check').forEach(l=>{l.classList.remove('sel');l.querySelector('input').checked=false;});
  openModal('itemModal');
}
function openEditItemModal(itemId){
  const item=db.items.find(i=>i.id===itemId);
  if(!item) return;
  itemModalCtx={eventId:item.eventId,personId:item.personId,sectionId:item.sectionId,itemId};
  document.getElementById('itemModalTitle').textContent='항목 수정';
  document.getElementById('im_text').value=item.text;
  document.getElementById('im_date').value=item.due||'';
  fillPersonSelect(item.personId);
  document.querySelectorAll('#im_tags .tag-check').forEach(l=>{
    const sel=item.tags.includes(l.dataset.tag);
    l.classList.toggle('sel',sel);
    l.querySelector('input').checked=sel;
  });
  openModal('itemModal');
}
function fillPersonSelect(selectedId){
  const sel=document.getElementById('im_person');
  sel.innerHTML=`<option value="">-- 선택 --</option>`+db.people.map(p=>`<option value="${p.id}"${p.id===selectedId?' selected':''}>${p.name} ${p.title}</option>`).join('');
}
function saveItem(){
  const text=document.getElementById('im_text').value.trim();
  if(!text){alert('내용을 입력하세요');return;}
  const personId=document.getElementById('im_person').value;
  const due=document.getElementById('im_date').value||null;
  const tags=[...document.querySelectorAll('#im_tags .tag-check.sel')].map(l=>l.dataset.tag);
  const {eventId,sectionId,itemId}=itemModalCtx;
  if(itemId){
    const item=db.items.find(i=>i.id===itemId);
    if(item){item.text=text;item.personId=personId;item.due=due;item.tags=tags;}
  } else {
    let secId=sectionId;
    if(!secId&&personId){
      let sec=db.sections.find(s=>s.eventId===eventId&&s.personId===personId&&s.title==='기타');
      if(!sec){sec={id:uid(),eventId,personId,title:'기타',order:999};db.sections.push(sec);}
      secId=sec.id;
    }
    db.items.push({id:uid(),eventId,personId,sectionId:secId,text,tags,due});
  }
  saveDB(); closeModal('itemModal'); render();
}
function deleteItem(id){
  if(!confirm('이 항목을 삭제할까요?')) return;
  db.items=db.items.filter(i=>i.id!==id);
  delete db.checked[id];
  saveDB(); render();
}

// ═══════════════════════════════════════════
// SECTION MODAL
// ═══════════════════════════════════════════
function openAddSectionModal(eventId,personId){
  sectionModalCtx={eventId,personId};
  document.getElementById('sm_text').value='';
  openModal('sectionModal');
}
function saveSection(){
  const title=document.getElementById('sm_text').value.trim();
  if(!title){alert('섹션 이름을 입력하세요');return;}
  const {eventId,personId}=sectionModalCtx;
  const order=db.sections.filter(s=>s.eventId===eventId&&s.personId===personId).length;
  db.sections.push({id:uid(),eventId,personId,title,order});
  saveDB(); closeModal('sectionModal'); render();
}
function deleteSec(id){
  if(!confirm('섹션과 포함된 항목을 모두 삭제할까요?')) return;
  const items=db.items.filter(i=>i.sectionId===id);
  items.forEach(i=>delete db.checked[i.id]);
  db.items=db.items.filter(i=>i.sectionId!==id);
  db.sections=db.sections.filter(s=>s.id!==id);
  saveDB(); render();
}
function editSectionTitle(id){
  const s=db.sections.find(x=>x.id===id);
  if(!s) return;
  const v=prompt('섹션명 수정:',s.title);
  if(v&&v.trim()){s.title=v.trim();saveDB();render();}
}

// ═══════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.backdrop').forEach(b=>{
  b.addEventListener('click',function(e){ if(e.target===this) this.classList.remove('show'); });
});

function setColorOpt(containerId, color){
  document.querySelectorAll('#'+containerId+' .color-opt').forEach(el=>{
    el.classList.toggle('sel', el.dataset.color===color);
  });
}
document.querySelectorAll('.color-options').forEach(container=>{
  container.addEventListener('click',function(e){
    const opt=e.target.closest('.color-opt');
    if(!opt) return;
    container.querySelectorAll('.color-opt').forEach(o=>o.classList.remove('sel'));
    opt.classList.add('sel');
  });
});

function attachTagListeners(){
  document.querySelectorAll('#im_tags .tag-check').forEach(label=>{
    label.onclick=function(){
      this.classList.toggle('sel');
      this.querySelector('input').checked=this.classList.contains('sel');
    };
  });
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function formatDate(d){
  if(!d) return '';
  const dt=new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function formatDateFull(d){
  if(!d) return '';
  const dt=new Date(d);
  return dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
